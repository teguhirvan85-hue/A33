<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Advisory33 — Under Renovation</title>
    <meta name="description" content="Advisory33 is under renovation, but still buying houses." />
    <meta name="theme-color" content="#000000" />
    <!-- PWA / "Add to Home Screen" — opens fullscreen on iOS Safari with
         no browser chrome at all. The status-bar-style draws the system
         status bar over our black background. mobile-web-app-capable is
         the Android/Chrome equivalent. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Advisory33" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link rel="apple-touch-icon" href="assets/logo.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script>
      // Layer 3 — minimize iOS Safari URL bar on load.
      // Safari hides the URL bar when the user scrolls down. Since this
      // landing page has no scrollable content, we trick it by making the
      // body briefly slightly taller than the viewport, scrolling 1px,
      // then restoring. Has no effect on Android/desktop; degrades
      // gracefully on iOS versions where the trick no longer works.
      (function () {
        var ua = navigator.userAgent || "";
        var isIOSSafari = /iP(ad|hone|od)/.test(ua) && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
        if (!isIOSSafari) return;
        function hideBar() {
          // Don't run if user has already scrolled or page is in standalone PWA mode.
          if (window.scrollY > 0) return;
          if (window.navigator.standalone) return;
          var html = document.documentElement;
          var body = document.body;
          if (!body) return;
          var prevBodyOverflow = body.style.overflow;
          var prevBodyMinHeight = body.style.minHeight;
          var prevHtmlOverflow = html.style.overflow;
          // Make page briefly scrollable so scrollTo registers.
          body.style.overflow = "visible";
          html.style.overflow = "auto";
          body.style.minHeight = "calc(100lvh + 1px)";
          // Two RAFs to ensure layout has applied before scrolling.
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              window.scrollTo(0, 1);
              // Restore after Safari registers the scroll & retracts the bar.
              setTimeout(function () {
                body.style.overflow = prevBodyOverflow;
                body.style.minHeight = prevBodyMinHeight;
                html.style.overflow = prevHtmlOverflow;
              }, 250);
            });
          });
        }
        if (document.readyState === "complete") {
          hideBar();
        } else {
          window.addEventListener("load", hideBar);
        }
      })();
    </script>
  </head>
  <body>
    <main class="stage">
      <!-- Chrome iridescent A33 image (Figma 11448:173) -->
      <div class="chrome" aria-hidden="true">
        <div class="chrome-wrap">
          <picture class="chrome-base">
            <source media="(max-width: 720px)" srcset="assets/a33-chrome-mobile.png" />
            <img src="assets/a33-chrome.png" alt="" />
          </picture>
        </div>
      </div>

      <!-- Background glow — 2 blurred circles (purple + blue) matching
           Figma 11448:63/66 frame7/frame8. -->
      <div class="glow" aria-hidden="true"></div>

      <header class="brand">
        <img src="assets/logo.svg" alt="Advisory33" class="logo" width="162" height="33" />
      </header>

      <section class="cta">
        <!-- pill + tagline grouped with gap-cta-inner (6px Figma 11448:82) -->
        <div class="cta-head">
        <!-- Glass pill — Figma-authored SVG (assets/pill.svg) used as
             the background image so all the layered glass effects are
             pixel-perfect from the source. Text is overlaid via CSS so
             it stays accessible/selectable.
             .pill-fx is an inline rainbow SVG (linear gradient stroke +
             blurred halo) that fades in on hover. -->
        <div class="pill" role="status" aria-label="Site status">
          <svg
            class="pill-fx"
            viewBox="0 0 280 57"
            preserveAspectRatio="none"
            aria-hidden="true"
            focusable="false"
            overflow="visible"
          >
            <defs>
              <linearGradient id="pill-rainbow" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#00ff5e" />
                <stop offset="18%" stop-color="#00e7ff" />
                <stop offset="36%" stop-color="#5b6dff" />
                <stop offset="54%" stop-color="#c038ff" />
                <stop offset="72%" stop-color="#ff2e9c" />
                <stop offset="88%" stop-color="#ff5e2e" />
                <stop offset="100%" stop-color="#ffae2e" />
              </linearGradient>
              <filter id="pill-blur" x="-20%" y="-150%" width="140%" height="400%">
                <feGaussianBlur stdDeviation="2.5 2.5" />
              </filter>
              <mask id="pill-outside-only" maskUnits="userSpaceOnUse">
                <rect x="-60" y="-200" width="400" height="457" fill="white" />
                <rect x="0" y="0" width="280" height="57" rx="28.5" ry="28.5" fill="black" />
              </mask>
            </defs>
            <!-- Outer halo — wide blurred rainbow stroke, masked to render
                 ONLY outside the pill so the interior stays clean. -->
            <g mask="url(#pill-outside-only)">
              <rect
                class="pill-fx-glow"
                x="0.5"
                y="0.5"
                width="279"
                height="56"
                rx="28"
                ry="28"
                fill="none"
                stroke="url(#pill-rainbow)"
                stroke-width="4"
                filter="url(#pill-blur)"
                vector-effect="non-scaling-stroke"
              />
            </g>
            <!-- Crisp rainbow line ON the perimeter -->
            <rect
              class="pill-fx-stroke"
              x="0.5"
              y="0.5"
              width="279"
              height="56"
              rx="28"
              ry="28"
              fill="none"
              stroke="url(#pill-rainbow)"
              stroke-width="1.5"
              vector-effect="non-scaling-stroke"
            />
          </svg>
          <span>Under Renovation</span>
        </div>
        <p class="tagline">But still buying houses</p>
        </div>
        <nav class="contacts" aria-label="Contact">
          <a href="tel:+61458120120" class="contact" aria-label="Call +61 458 120 120">
            <img src="assets/icon-call.svg" alt="" aria-hidden="true" class="icon" width="24" height="24" />
            <span>Call</span>
          </a>
          <a href="mailto:hello@advisory33.com" class="contact" aria-label="Mail hello@advisory33.com">
            <img src="assets/icon-email.svg" alt="" aria-hidden="true" class="icon" width="24" height="24" />
            <span>Mail</span>
          </a>
          <a href="https://instagram.com/advisory33_ba" target="_blank" rel="noopener noreferrer" class="contact" aria-label="Instagram @advisory33_ba">
            <img src="assets/icon-ig.svg" alt="" aria-hidden="true" class="icon" width="24" height="24" />
            <span>IG</span>
          </a>
        </nav>
      </section>

      <footer class="legal">
        <p>Roth Realty Pty Ltd ACN 651 481 515</p>
        <p>Corporation Licence 10113443</p>
      </footer>
    </main>
    <script type="module" src="fluid.js"></script>
  </body>
</html>
